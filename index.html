<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoKnowledge Pro AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="topbar">
    <h1>AutoKnowledge Pro AI</h1>
    <div id="userStatus">Not logged in</div>
    <button id="logoutBtn" hidden>Logout</button>
  </header>

  <div class="container">

    <section class="panel">
      <h2>Login</h2>

      <input id="email" placeholder="Email" autocomplete="email" />
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" />

      <button id="loginBtn">Login</button>
      <button id="signupBtn">Sign Up</button>

      <p id="authMessage"></p>
    </section>

    <section class="panel">
      <h2>Customer & Vehicle Profile</h2>

      <input id="customerName" placeholder="Customer Name" />
      <input id="customerPhone" placeholder="Customer Phone" />
      <input id="vehicleMake" placeholder="Vehicle Make" />
      <input id="vehicleModel" placeholder="Vehicle Model" />
      <input id="vehicleReg" placeholder="Registration Number" />
      <input id="vehicleMileage" placeholder="Mileage" />
      <textarea id="serviceNotes" placeholder="Service Notes / Complaint"></textarea>

      <p id="profileMessage"></p>
    </section>

    <section class="panel">
      <h2>AI Diagnostic Engine</h2>

      <select id="fault">
        <option value="overheat">Overheating</option>
        <option value="no_start">No Start</option>
        <option value="misfire">Misfire</option>
        <option value="battery">Battery Drain</option>
        <option value="rough_idle">Rough Idle</option>
      </select>

      <button id="runAiBtn">Run Analysis</button>
      <button id="saveReportBtn">Save Report</button>

      <h3 id="result">Awaiting analysis...</h3>
      <p id="confidence">--</p>
      <p id="aiExplain"></p>
      <pre id="steps"></pre>

      <p id="reportMessage"></p>
    </section>

    <section class="panel">
      <h2>OBD Scanner</h2>

      <input id="code" placeholder="P0300,P0171" />

      <button id="lookupBtn">Analyse</button>

      <pre id="codeOut"></pre>
    </section>

    <section class="panel">
      <h2>Workshop Reports</h2>

      <input id="reportSearch" placeholder="Search reports" />

      <select id="reportSort">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="confidence">Highest Confidence</option>
      </select>

      <button id="loadReportsBtn">Load Reports</button>
      <button id="exportPdfBtn">Export PDF</button>

      <div id="reportList"></div>
    </section>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
