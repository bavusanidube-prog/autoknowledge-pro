<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Vehicle Diagnostic Report | AutoKnowledge Pro AI</title>
  <meta name="description" content="Professional vehicle diagnostic report generated by AutoKnowledge Pro AI." />
  <meta name="theme-color" content="#07111f" />

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#07111f;
      --panel:#ffffff;
      --ink:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --accent:#f59e0b;
      --accent2:#fbbf24;
      --blue:#0284c7;
      --green:#16a34a;
      --red:#dc2626;
      --amber:#d97706;
    }

    * {
      box-sizing:border-box;
    }

    body {
      margin:0;
      font-family:Inter,system-ui,sans-serif;
      background:
        radial-gradient(circle at top right, rgba(245,158,11,.18), transparent 30%),
        linear-gradient(180deg,#07111f,#0f172a);
      color:var(--ink);
      padding:28px;
    }

    .report-shell {
      max-width:1050px;
      margin:0 auto;
    }

    .report-actions {
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
    }

    .back-link,
    .print-btn {
      border:0;
      border-radius:999px;
      padding:12px 18px;
      font-weight:900;
      text-decoration:none;
      cursor:pointer;
    }

    .back-link {
      color:#e5eefb;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
    }

    .print-btn {
      color:#07111f;
      background:linear-gradient(135deg,var(--accent2),var(--accent));
    }

    .report-document {
      background:#fff;
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 30px 90px rgba(0,0,0,.35);
    }

    .report-header {
      background:
        radial-gradient(circle at top right, rgba(245,158,11,.22), transparent 32%),
        linear-gradient(135deg,#07111f,#111827);
      color:white;
      padding:34px;
      display:grid;
      grid-template-columns:1.4fr .8fr;
      gap:24px;
      align-items:start;
    }

    .brand {
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:22px;
    }

    .logo {
      width:52px;
      height:52px;
      display:grid;
      place-items:center;
      border-radius:16px;
      background:linear-gradient(135deg,var(--accent2),var(--accent));
      color:#07111f;
      font-weight:900;
    }

    .brand strong {
      display:block;
      font-size:1.1rem;
    }

    .brand span {
      color:#cbd5e1;
      font-size:.9rem;
    }

    .report-header h1 {
      font-size:clamp(2rem,4vw,3.6rem);
      line-height:1;
      letter-spacing:-.06em;
      margin:0 0 14px;
    }

    .report-header p {
      color:#cbd5e1;
      line-height:1.7;
      margin:0;
    }

    .report-id-card {
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      border-radius:22px;
      padding:22px;
    }

    .report-id-card span {
      display:block;
      color:#cbd5e1;
      font-size:.85rem;
      margin-bottom:6px;
    }

    .report-id-card strong {
      display:block;
      color:white;
      font-size:1.2rem;
      margin-bottom:14px;
    }

    .status-pill {
      display:inline-flex;
      padding:8px 11px;
      border-radius:999px;
      background:rgba(245,158,11,.14);
      border:1px solid rgba(245,158,11,.25);
      color:#fbbf24;
      font-weight:900;
      font-size:.8rem;
    }

    .report-body {
      padding:34px;
      display:grid;
      gap:24px;
    }

    .summary-grid {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:14px;
    }

    .summary-card,
    .report-section {
      border:1px solid var(--line);
      border-radius:22px;
      background:#fff;
      box-shadow:0 12px 30px rgba(15,23,42,.06);
    }

    .summary-card {
      padding:20px;
    }

    .summary-card span {
      display:block;
      color:var(--muted);
      font-size:.85rem;
      font-weight:800;
      margin-bottom:8px;
    }

    .summary-card strong {
      display:block;
      color:var(--ink);
      font-size:1.35rem;
      letter-spacing:-.04em;
    }

    .risk-high {
      color:var(--red)!important;
    }

    .risk-medium {
      color:var(--amber)!important;
    }

    .risk-low {
      color:var(--green)!important;
    }

    .report-section {
      padding:24px;
    }

    .section-title {
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
      margin-bottom:16px;
    }

    .section-title h2 {
      margin:0;
      font-size:1.35rem;
      letter-spacing:-.04em;
    }

    .section-title span {
      color:var(--muted);
      font-size:.9rem;
      font-weight:700;
    }

    .two-col {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .info-list {
      display:grid;
      gap:10px;
    }

    .info-row {
      display:flex;
      justify-content:space-between;
      gap:18px;
      padding:12px 0;
      border-bottom:1px solid #f1f5f9;
    }

    .info-row span {
      color:var(--muted);
      font-weight:700;
    }

    .info-row strong {
      text-align:right;
    }

    .confidence-wrap {
      display:grid;
      gap:10px;
    }

    .confidence-bar {
      height:16px;
      border-radius:999px;
      background:#e2e8f0;
      overflow:hidden;
    }

    .confidence-fill {
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      border-radius:inherit;
    }

    .diagnosis-box {
      padding:24px;
      border-radius:22px;
      background:#f8fafc;
      border:1px solid #e2e8f0;
    }

    .diagnosis-box h3 {
      margin:0 0 10px;
      font-size:1.6rem;
      letter-spacing:-.05em;
    }

    .diagnosis-box p {
      color:var(--muted);
      line-height:1.7;
      margin:0;
    }

    .steps-list {
      counter-reset:step;
      display:grid;
      gap:12px;
    }

    .step {
      counter-increment:step;
      display:grid;
      grid-template-columns:auto 1fr;
      gap:12px;
      align-items:start;
      padding:14px;
      border-radius:16px;
      background:#f8fafc;
      border:1px solid #e2e8f0;
    }

    .step::before {
      content:counter(step);
      width:30px;
      height:30px;
      display:grid;
      place-items:center;
      border-radius:10px;
      background:#0f172a;
      color:#fff;
      font-weight:900;
    }

    .invoice-grid {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }

    .invoice-item {
      padding:14px;
      border-radius:16px;
      background:#f8fafc;
      border:1px solid #e2e8f0;
      display:flex;
      justify-content:space-between;
      gap:14px;
    }

    .invoice-total {
      background:#0f172a;
      color:#fff;
    }

    .loading,
    .error {
      background:#fff;
      border-radius:22px;
      padding:24px;
      text-align:center;
      font-weight:900;
    }

    .error {
      color:var(--red);
    }

    @media(max-width:850px) {
      body {
        padding:14px;
      }

      .report-header,
      .summary-grid,
      .two-col,
      .invoice-grid {
        grid-template-columns:1fr;
      }

      .report-header,
      .report-body {
        padding:24px;
      }

      .report-actions {
        flex-direction:column;
      }
    }

    @media print {
      body {
        background:#fff;
        padding:0;
      }

      .report-actions {
        display:none;
      }

      .report-document {
        box-shadow:none;
        border-radius:0;
      }

      .report-shell {
        max-width:none;
      }
    }
  </style>
</head>

<body>
  <main class="report-shell">
    <div class="report-actions">
      <a href="index.html" class="back-link">← Back to Dashboard</a>
      <button class="print-btn" onclick="window.print()">Print / Save PDF</button>
    </div>

    <div id="reportRoot" class="loading">Loading diagnostic report...</div>
  </main>

  <script type="module">
    import { watchAuthState, getReportById } from "./firebase.js";

    const root = document.getElementById("reportRoot");
    const params = new URLSearchParams(window.location.search);
    const reportId = params.get("id");

    function money(value) {
      return `£${Number(value || 0).toFixed(2)}`;
    }

    function safe(value, fallback = "N/A") {
      return value === undefined || value === null || value === "" ? fallback : String(value);
    }

    function formatDate(value) {
      if (!value) return "Unknown date";
      if (typeof value.toDate === "function") return value.toDate().toLocaleString();
      if (value?.seconds) return new Date(value.seconds * 1000).toLocaleString();
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? "Unknown date" : date.toLocaleString();
    }

    function riskClass(value) {
      const text = String(value || "").toLowerCase();
      if (text.includes("critical") || text.includes("high") || text.includes("unsafe")) return "risk-high";
      if (text.includes("medium") || text.includes("limited") || text.includes("caution")) return "risk-medium";
      return "risk-low";
    }

    function stepsArray(report) {
      return String(report.steps || "")
        .split("\\n")
        .map(step => step.replace(/^\\d+\\.\\s*/, "").trim())
        .filter(Boolean);
    }

    function render(report) {
      const confidence = Number(report.confidence || 0);
      const steps = stepsArray(report);

      root.className = "report-document";
      root.innerHTML = `
        <header class="report-header">
          <div>
            <div class="brand">
              <div class="logo">AK</div>
              <div>
                <strong>AutoKnowledge Pro AI</strong>
                <span>Workshop Diagnostic Report</span>
              </div>
            </div>

            <h1>Vehicle Diagnostic Report</h1>
            <p>
              A customer-facing diagnostic summary covering likely fault area, confidence,
              safe-to-drive guidance, MOT impact, recommended checks and invoice summary.
            </p>
          </div>

          <aside class="report-id-card">
            <span>Session ID</span>
            <strong>${safe(report.sessionId)}</strong>

            <span>Generated</span>
            <strong>${formatDate(report.createdAt)}</strong>

            <span class="status-pill">${safe(report.paymentStatus, "Unpaid")}</span>
          </aside>
        </header>

        <section class="report-body">

          <div class="summary-grid">
            <div class="summary-card">
              <span>Primary Diagnosis</span>
              <strong>${safe(report.fault || report.title)}</strong>
            </div>

            <div class="summary-card">
              <span>Confidence</span>
              <strong>${confidence}%</strong>
            </div>

            <div class="summary-card">
              <span>Urgency</span>
              <strong class="${riskClass(report.urgency)}">${safe(report.urgency)}</strong>
            </div>

            <div class="summary-card">
              <span>Invoice Total</span>
              <strong>${money(report.grandTotal)}</strong>
            </div>
          </div>

          <section class="report-section">
            <div class="section-title">
              <div>
                <h2>Customer & Vehicle</h2>
                <span>Session intake details</span>
              </div>
            </div>

            <div class="two-col">
              <div class="info-list">
                <div class="info-row"><span>Customer</span><strong>${safe(report.customerName)}</strong></div>
                <div class="info-row"><span>Phone</span><strong>${safe(report.customerPhone)}</strong></div>
                <div class="info-row"><span>Registration</span><strong>${safe(report.vehicleReg)}</strong></div>
              </div>

              <div class="info-list">
                <div class="info-row"><span>Vehicle</span><strong>${safe(report.vehicleMake)} ${safe(report.vehicleModel, "")}</strong></div>
                <div class="info-row"><span>Mileage</span><strong>${safe(report.vehicleMileage)}</strong></div>
                <div class="info-row"><span>Fault Group</span><strong>${safe(report.faultGroup)}</strong></div>
              </div>
            </div>
          </section>

          <section class="report-section">
            <div class="section-title">
              <div>
                <h2>Diagnostic Confidence</h2>
                <span>System-generated probability score</span>
              </div>
            </div>

            <div class="confidence-wrap">
              <strong>${confidence}% confidence</strong>
              <div class="confidence-bar">
                <div class="confidence-fill" style="width:${confidence}%"></div>
              </div>
            </div>
          </section>

          <section class="report-section">
            <div class="section-title">
              <div>
                <h2>Primary Diagnostic Finding</h2>
                <span>Workshop explanation</span>
              </div>
            </div>

            <div class="diagnosis-box">
              <h3>${safe(report.fault || report.title)}</h3>
              <p>${safe(report.explanation)}</p>
            </div>
          </section>

          <section class="report-section">
            <div class="section-title">
              <div>
                <h2>Safety & MOT Guidance</h2>
                <span>Customer-facing risk summary</span>
              </div>
            </div>

            <div class="two-col">
              <div class="diagnosis-box">
                <h3 class="${riskClass(report.safe)}">Safe To Drive?</h3>
                <p>${safe(report.safe)}</p>
              </div>

              <div class="diagnosis-box">
                <h3>MOT Impact</h3>
                <p>${safe(report.mot)}</p>
              </div>
            </div>
          </section>

          <section class="report-section">
            <div class="section-title">
              <div>
                <h2>Recommended Diagnostic Steps</h2>
                <span>Technician inspection path</span>
              </div>
            </div>

            <div class="steps-list">
              ${
                steps.length
                  ? steps.map(step => `<div class="step">${step}</div>`).join("")
                  : `<div class="step">No diagnostic steps recorded.</div>`
              }
            </div>
          </section>

          <section class="report-section">
            <div class="section-title">
              <div>
                <h2>Invoice Summary</h2>
                <span>Estimated or calculated workshop totals</span>
              </div>
            </div>

            <div class="invoice-grid">
              <div class="invoice-item"><span>Labour Total</span><strong>${money(report.labourTotal)}</strong></div>
              <div class="invoice-item"><span>Subtotal</span><strong>${money(report.subTotal)}</strong></div>
              <div class="invoice-item"><span>VAT Total</span><strong>${money(report.vatTotal)}</strong></div>
              <div class="invoice-item invoice-total"><span>Grand Total</span><strong>${money(report.grandTotal)}</strong></div>
            </div>
          </section>

          <section class="report-section">
            <div class="section-title">
              <div>
                <h2>Technician Notes</h2>
                <span>Customer complaint / service notes</span>
              </div>
            </div>

            <div class="diagnosis-box">
              <p>${safe(report.serviceNotes, "No technician notes recorded.")}</p>
            </div>
          </section>

        </section>
      `;
    }

    if (!reportId) {
      root.className = "error";
      root.textContent = "No report ID provided.";
    } else {
      watchAuthState(async (user) => {
        if (!user) {
          root.className = "error";
          root.textContent = "Please log in from the dashboard before viewing this report.";
          return;
        }

        try {
          const report = await getReportById(reportId);
          render(report);
        } catch (error) {
          root.className = "error";
          root.textContent = error.message || "Could not load report.";
        }
      });
    }
  </script>
</body>
</html>
